apiVersion: batch/v1
kind: Job
metadata:
  name: actor-load-generator
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      restartPolicy: Never
      containers:
      - name: client
        image: actor-client:latest
        imagePullPolicy: IfNotPresent
        # 真實內網壓測大砲設定：
        # -tps=100000      : 期望把 2 檯 Node 打到 10 萬 TPS。
        # -concurrency=5000: 模擬 Gateway 挾帶 5 千長連線。
        # -batch=2000      : 將 Envelope 高度壓實，降低網路 I/O Syscall。
        # -flush-delay=5ms : batch 未滿時，最多等待多久就強制送出。
        # -drain-window=60s: 停止送流量後，最多再等 60 秒排空 in-flight。
        # -uid-min/-uid-max: 控制亂數 UID 範圍，用來測熱點 actor 或大範圍分散壓測。
        args: ["stress", "-etcd=etcd-client:2379", "-tps=100000", "-concurrency=5000", "-batch=2000", "-flush-delay=5ms", "-duration=30s", "-drain-window=60s", "-uid-min=1", "-uid-max=100"]
